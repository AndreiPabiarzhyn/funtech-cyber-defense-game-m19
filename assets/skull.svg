<!-- череп -->
<circle cx="50" cy="45" r="28" fill="#ffffff" stroke="#333" stroke-width="3"></circle>

<!-- глазницы -->
<circle cx="38" cy="40" r="7" fill="#222"></circle>
<circle cx="62" cy="40" r="7" fill="#222"></circle>

<!-- блики глаз -->
<circle cx="40" cy="38" r="2" fill="white"></circle>
<circle cx="64" cy="38" r="2" fill="white"></circle>

<!-- нос -->
