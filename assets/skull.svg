<line x1="45" y1="58" x2="45" y2="68" stroke="#333" stroke-width="2"></line>
<line x1="50" y1="58" x2="50" y2="68" stroke="#333" stroke-width="2"></line>
<line x1="55" y1="58" x2="55" y2="68" stroke="#333" stroke-width="2"></line>

<!-- маленькие "рожки-вампир" -->
